<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceApp | Login</title>
    <!-- Fuentes -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- CSS Modular -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/themes.css">
</head>
<body class="login-body">
<!-- Theme Switcher (mismo código) -->
	<div class="theme-switcher">
	    <div class="theme-btn" id="themeBtn" onclick="toggleThemeMenu()">
	        <div class="theme-circle" id="currentThemeCircle" style="background: rgb(0, 0, 0);"></div>
	    </div>
	    <div class="theme-menu" id="themeMenu">
	        <div class="theme-option" onclick="setTheme('dark')">
	            <div class="theme-preview dark-preview"></div>
	            <span>Dark</span>
	        </div>
	        <div class="theme-option" onclick="setTheme('light')">
	            <div class="theme-preview light-preview"></div>
	            <span>Light</span>
	        </div>
	        <div class="theme-option" onclick="setTheme('pink')">
	            <div class="theme-preview pink-preview"></div>
	            <span>Pink Purple</span>
	        </div>
	        <div class="theme-option" onclick="setTheme('blue')">
	            <div class="theme-preview blue-preview"></div>
	            <span>Ocean Blue</span>
	        </div>
	        <div class="theme-option" onclick="setTheme('orange')">
	            <div class="theme-preview orange-preview"></div>
	            <span>Sunset Orange</span>
	        </div>
	    </div>
	</div>
    <div class="particles"></div>
    <div class="glass-container">
        <div class="logo-container">
            <div class="logo-icon">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="url(#gradient)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M2 17L12 22L22 17" stroke="url(#gradient)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M2 12L12 17L22 12" stroke="url(#gradient)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <defs>
                        <linearGradient id="gradient" x1="2" y1="2" x2="22" y2="22" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#ffffff"/>
                            <stop offset="1" stop-color="#888888"/>
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <h1>FINANCE<span>APP</span></h1>
        </div>
        
        <h2>Welcome Back</h2>
        <p class="subtitle">Sign in to your account</p>
        
        <form id="loginForm" class="auth-form">
            <div class="input-group">
                <label>Nickname</label>
                <input type="text" id="nickname" placeholder="johndoe" required>
                <div class="input-border"></div>
            </div>
            
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
                <div class="input-border"></div>
            </div>
            
            <button type="submit" class="btn-primary">
                <span>Sign In</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                    <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
        </form>
        
        <div class="auth-footer">
            <p>Don't have an account? <a href="register.html">Create account</a></p>
        </div>
    </div>
    
    <script>
    const API_BASE = 'http://localhost:8080';
    
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const nickname = document.getElementById('nickname').value.trim();
        const password = document.getElementById('password').value;
        
        if (!nickname || !password) {
            alert('Please enter both nickname and password');
            return;
        }
        
        try {
            // Obtener todos los usuarios del servidor
            const response = await fetch(`${API_BASE}/users`);
            const users = await response.json();
            
            // Buscar usuario por nombre y contraseña
            const user = users.find(u => u.name === nickname && u.password === password);
            
            if (user) {
                // Login exitoso
                localStorage.setItem('user', JSON.stringify(user));
                window.location.href = 'dashboard.html';
            } else {
                // Verificar si el usuario existe pero contraseña incorrecta
                const userExists = users.some(u => u.name === nickname);
                if (userExists) {
                    alert('Incorrect password. Please try again.');
                } else {
                    alert('User not found. Please register first.');
                }
            }
        } catch (error) {
            console.error('Login error:', error);
            alert('Error connecting to server. Make sure the backend is running.');
        }
    });
 // Theme Switcher Functions
    function toggleThemeMenu() {
        const menu = document.getElementById('themeMenu');
        menu.classList.toggle('active');
    }

    function closeThemeMenu() {
        const menu = document.getElementById('themeMenu');
        menu.classList.remove('active');
    }

    function setTheme(theme) {
        const body = document.body;
        const themeCircle = document.getElementById('currentThemeCircle');
        
        // Remover todas las clases de tema
        body.classList.remove('theme-light', 'theme-pink', 'theme-blue', 'theme-orange');
        
        // Si no es dark, agregar la clase del tema
        if (theme !== 'dark') {
            body.classList.add(`theme-${theme}`);
        }
        
        // Actualizar el círculo del botón según el tema
        const themeColors = {
            dark: '#000000',
            light: '#F0E6E6',
            pink: '#ec489a',
            blue: '#0ea5e9',
            orange: '#f97316'
        };
        
        themeCircle.style.background = themeColors[theme];
        
        // Guardar preferencia en localStorage
        localStorage.setItem('theme', theme);
        
        // Mostrar notificación
        const themeNames = {
            dark: 'Dark Mode',
            light: 'Light Mode',
            pink: 'Pink Purple',
            blue: 'Ocean Blue',
            orange: 'Sunset Orange'
        };
        
        toast.success(`Theme changed to ${themeNames[theme]}! 🎨`);
        
        // Cerrar el menú
        closeThemeMenu();
    }

    // Cargar tema guardado al iniciar
    function loadSavedTheme() {
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme && savedTheme !== 'dark') {
            setTheme(savedTheme);
        } else {
            // Asegurar que el círculo sea blanco para dark mode
            document.getElementById('currentThemeCircle').style.background = '#ffffff';
        }
    }

    // Cerrar menú al hacer clic fuera
    document.addEventListener('click', function(event) {
        const switcher = document.querySelector('.theme-switcher');
        const menu = document.getElementById('themeMenu');
        const btn = document.getElementById('themeBtn');
        
        if (switcher && !switcher.contains(event.target)) {
            menu.classList.remove('active');
        }
    });
</script>
</body>
</html>
