<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceApp | Login</title>
    
    <!-- Fuentes -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- CSS Modular -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/themes.css">
</head>
<body class="login-body">
    <div class="particles"></div>
    <div class="glass-container">
        <div class="logo-container">
            <div class="logo-icon">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="url(#gradient)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M2 17L12 22L22 17" stroke="url(#gradient)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M2 12L12 17L22 12" stroke="url(#gradient)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <defs>
                        <linearGradient id="gradient" x1="2" y1="2" x2="22" y2="22" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#ffffff"/>
                            <stop offset="1" stop-color="#888888"/>
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <h1>FINANCE<span>APP</span></h1>
        </div>
        
        <h2>Welcome Back</h2>
        <p class="subtitle">Sign in to your account</p>
        
        <form id="loginForm" class="auth-form">
            <div class="input-group">
                <label>Nickname</label>
                <input type="text" id="nickname" placeholder="johndoe" required>
                <div class="input-border"></div>
            </div>
            
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
                <div class="input-border"></div>
            </div>
            
            <button type="submit" class="btn-primary">
                <span>Sign In</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                    <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
        </form>
        
        <div class="auth-footer">
            <p>Don't have an account? <a href="register.html">Create account</a></p>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080';

        // ============================================
        // LOGIN FUNCTIONALITY
        // ============================================
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const nickname = document.getElementById('nickname').value.trim();
            const password = document.getElementById('password').value;
            
            if (!nickname || !password) {
                showColorToast('Please enter both nickname and password', '#f59e0b');
                return;
            }
            
            // Mostrar loading en el botón
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<span class="loading-spinner"></span> Loading...';
            submitBtn.disabled = true;
            
            try {
                const response = await fetch(`${API_BASE}/users`);
                const users = await response.json();
                
                const user = users.find(u => u.name === nickname && u.password === password);
                
                if (user) {
                    localStorage.setItem('user', JSON.stringify(user));
                    showColorToast(`Welcome back, ${user.name}! 🎉`, '#10b981');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1000);
                } else {
                    const userExists = users.some(u => u.name === nickname);
                    if (userExists) {
                        showColorToast('Incorrect password. Please try again.', '#ef4444');
                    } else {
                        showColorToast('User not found. Please register first.', '#f59e0b');
                    }
                    submitBtn.innerHTML = originalText;
                    submitBtn.disabled = false;
                }
            } catch (error) {
                console.error('Login error:', error);
                showColorToast('Connection error. Make sure the server is running.', '#ef4444');
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
