<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceApp | Register</title>
    <!-- Fuentes -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- CSS Modular -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/themes.css">
</head>
<body class="login-body">
<!-- Theme Switcher (mismo código) -->
	<div class="theme-switcher">
	    <div class="theme-btn" id="themeBtn" onclick="toggleThemeMenu()">
	        <div class="theme-circle" id="currentThemeCircle" style="background: rgb(0, 0, 0);"></div>
	    </div>
	    <div class="theme-menu" id="themeMenu">
	        <div class="theme-option" onclick="setTheme('dark')">
	            <div class="theme-preview dark-preview"></div>
	            <span>Dark</span>
	        </div>
	        <div class="theme-option" onclick="setTheme('light')">
	            <div class="theme-preview light-preview"></div>
	            <span>Light</span>
	        </div>
	        <div class="theme-option" onclick="setTheme('pink')">
	            <div class="theme-preview pink-preview"></div>
	            <span>Pink Purple</span>
	        </div>
	        <div class="theme-option" onclick="setTheme('blue')">
	            <div class="theme-preview blue-preview"></div>
	            <span>Ocean Blue</span>
	        </div>
	        <div class="theme-option" onclick="setTheme('orange')">
	            <div class="theme-preview orange-preview"></div>
	            <span>Sunset Orange</span>
	        </div>
	    </div>
	</div>
    <div class="particles"></div>
    <div class="glass-container">
        <div class="logo-container">
            <div class="logo-icon">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none">
                    <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="white" stroke-width="1.5"/>
                    <path d="M2 17L12 22L22 17" stroke="white" stroke-width="1.5"/>
                    <path d="M2 12L12 17L22 12" stroke="white" stroke-width="1.5"/>
                </svg>
            </div>
            <h1>FINANCE<span>APP</span></h1>
        </div>
        
        <h2>Create Account</h2>
        <p class="subtitle">Get started with your financial journey</p>
        
        <form id="registerForm" class="auth-form">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="John Doe" required>
                <div class="input-border"></div>
            </div>
            
            <div class="input-group">
                <label>Nickname</label>
                <input type="text" id="nickname" placeholder="johndoe" required>
                <div class="input-border"></div>
            </div>
            
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
                <div class="input-border"></div>
            </div>
            
            <div class="input-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="••••••••" required>
                <div class="input-border"></div>
            </div>
            
            <button type="submit" class="btn-primary">
                <span>Create Account</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                    <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="currentColor" stroke-width="2"/>
                </svg>
            </button>
        </form>
        
        <div class="auth-footer">
            <p>Already have an account? <a href="login.html">Sign in</a></p>
        </div>
    </div>
    
<script>
    const API_BASE = 'http://localhost:8080';
    
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const name = document.getElementById('name').value.trim();
        const nickname = document.getElementById('nickname').value.trim();
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        
        // Validaciones
        if (!name || !nickname || !password) {
            alert('All fields are required');
            return;
        }
        
        if (name.length < 3) {
            alert('Name must be at least 3 characters');
            return;
        }
        
        if (nickname.length < 3) {
            alert('Nickname must be at least 3 characters');
            return;
        }
        
        if (password.length < 5) {
            alert('Password must be at least 5 characters');
            return;
        }
        
        if (password !== confirmPassword) {
            alert('Passwords do not match');
            return;
        }
        
        const user = {
            name: name,
            password: password
        };
        
        console.log('Registering user:', user);
        
        try {
            const response = await fetch(`${API_BASE}/users`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(user)
            });
            
            if (response.ok) {
                const newUser = await response.json();
                console.log('User created with ID:', newUser.id);
                localStorage.setItem('user', JSON.stringify(newUser));
                alert('Account created successfully! Welcome to FinanceApp!');
                window.location.href = 'dashboard.html';
            } else {
                const errorText = await response.text();
                console.error('Server error:', errorText);
                alert('Error creating account. Username may already exist.');
            }
        } catch (error) {
            console.error('Registration error:', error);
            alert('Error connecting to server. Make sure the backend is running.');
        }
    });
 // Theme Switcher Functions
    function toggleThemeMenu() {
        const menu = document.getElementById('themeMenu');
        menu.classList.toggle('active');
    }

    function closeThemeMenu() {
        const menu = document.getElementById('themeMenu');
        menu.classList.remove('active');
    }

    function setTheme(theme) {
        const body = document.body;
        const themeCircle = document.getElementById('currentThemeCircle');
        
        // Remover todas las clases de tema
        body.classList.remove('theme-light', 'theme-pink', 'theme-blue', 'theme-orange');
        
        // Si no es dark, agregar la clase del tema
        if (theme !== 'dark') {
            body.classList.add(`theme-${theme}`);
        }
        
        // Actualizar el círculo del botón según el tema
        const themeColors = {
            dark: '#000000',
            light: '#F0E6E6',
            pink: '#ec489a',
            blue: '#0ea5e9',
            orange: '#f97316'
        };
        
        themeCircle.style.background = themeColors[theme];
        
        // Guardar preferencia en localStorage
        localStorage.setItem('theme', theme);
        
        // Mostrar notificación
        const themeNames = {
            dark: 'Dark Mode',
            light: 'Light Mode',
            pink: 'Pink Purple',
            blue: 'Ocean Blue',
            orange: 'Sunset Orange'
        };
        
        toast.success(`Theme changed to ${themeNames[theme]}! 🎨`);
        
        // Cerrar el menú
        closeThemeMenu();
    }

    // Cargar tema guardado al iniciar
    function loadSavedTheme() {
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme && savedTheme !== 'dark') {
            setTheme(savedTheme);
        } else {
            // Asegurar que el círculo sea blanco para dark mode
            document.getElementById('currentThemeCircle').style.background = '#ffffff';
        }
    }

    // Cerrar menú al hacer clic fuera
    document.addEventListener('click', function(event) {
        const switcher = document.querySelector('.theme-switcher');
        const menu = document.getElementById('themeMenu');
        const btn = document.getElementById('themeBtn');
        
        if (switcher && !switcher.contains(event.target)) {
            menu.classList.remove('active');
        }
    });
</script>
</body>
</html>
